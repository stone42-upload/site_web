<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joyeux Anniversaire 🎉</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #0a0a0a;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .scene-container {
            width: 100%;
            height: 100%;
        }

        .intro-scene {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a1a 100%);
            z-index: 10;
            pointer-events: auto;
        }

        .intro-title {
            font-size: 3.5rem;
            color: #666;
            margin-bottom: 4rem;
            text-align: center;
            font-weight: 300;
            letter-spacing: 2px;
            animation: fadeInDown 1s ease-out;
        }

        .question-box {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 105, 180, 0.3);
            padding: 2rem 3rem;
            border-radius: 15px;
            text-align: center;
            animation: slideInUp 0.8s ease-out;
            backdrop-filter: blur(10px);
        }

        .question-text {
            font-size: 1.8rem;
            color: #999;
            margin-bottom: 2rem;
            font-weight: 300;
        }

        .button-group {
            display: flex;
            gap: 2rem;
            justify-content: center;
        }

        .btn {
            padding: 12px 40px;
            font-size: 1.1rem;
            border: 2px solid rgba(255, 105, 180, 0.6);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            color: #ff69b4;
            font-weight: 600;
            pointer-events: auto;
        }

        .btn:hover {
            background: rgba(255, 105, 180, 0.2);
            border-color: #ff69b4;
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.4);
        }

        .btn-yes {
            color: #4ade80;
            border-color: rgba(74, 222, 128, 0.6);
        }

        .btn-yes:hover {
            background: rgba(74, 222, 128, 0.2);
            border-color: #4ade80;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.4);
        }

        .btn-no {
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.6);
        }

        .btn-no:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
            position: relative;
        }

        .hidden {
            display: none !important;
        }

        .orientation-hint {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #4ade80;
            padding: 2rem 3rem;
            border-radius: 15px;
            text-align: center;
            font-size: 1.5rem;
            z-index: 20;
            pointer-events: none;
            animation: pulse 1.5s infinite;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }

        .candle-hint {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            color: #ff69b4;
            font-size: 1rem;
            opacity: 0.7;
            animation: bob 2s infinite;
            z-index: 5;
            pointer-events: none;
        }

        @keyframes bob {
            0%, 100% {
                transform: translateX(-50%) translateY(0);
            }
            50% {
                transform: translateX(-50%) translateY(-10px);
            }
        }

        svg {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="scene-container" id="canvas-container"></div>

        <div class="intro-scene" id="introScene">
            <div class="intro-title">✨ ça c'est moi sans toi ✨</div>
            <div class="question-box">
                <div class="question-text">Tu veux voir la suite?</div>
                <div class="button-group">
                    <button class="btn btn-yes" id="btnYes">Oui 💚</button>
                    <button class="btn btn-no" id="btnNo">Non</button>
                </div>
            </div>
        </div>

        <div class="orientation-hint hidden" id="orientationHint">
            📱 Incline ton écran bb! 📱
        </div>

        <div class="candle-hint hidden" id="candleHint">
            🎂 Souffle les bougies! 🎂
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="anniversary.js"></script>
</body>
</html>
